# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  schedule:
    - cron:  '10 0/1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  LATEST_CALENDAR_URL: "https://github.com/sportclimbing/ifsc-calendar/releases/latest/download/IFSC-World-Cups-and-World-Championships.json"
  YEAR: 2026

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom

      - name: "Download latest calendar"
        run: |
          curl -sSL "${{ env.LATEST_CALENDAR_URL }}" \
              --output "public/events/events_${YEAR}.json" \
              --max-time 15

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Install frontend test dependencies"
        run: npm install --no-package-lock

      - name: "Install Playwright browser"
        run: npx playwright install --with-deps chromium

      - name: "Run frontend integration tests"
        run: npx playwright test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom

      - name: "Download latest calendar"
        run: |
          curl -sSL "${{ env.LATEST_CALENDAR_URL }}" \
              --output "public/events/events_${YEAR}.json" \
              --max-time 15

      - name: "Build structured data"
        run: php bin/build-structured-data

      - name: "Build sitemap"
        run: php bin/build-sitemap

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'public/'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
