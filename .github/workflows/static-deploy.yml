# Simple workflow for deploying static content to GitHub Pages
name: "Deploy static content to Pages"

on:
  push:
    branches:
      - main
  schedule:
    - cron:  '10 0/1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  LATEST_CALENDAR_URL: "https://github.com/sportclimbing/ifsc-calendar/releases/latest/download/IFSC-World-Cups-and-World-Championships.json"
  YEAR: 2026

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Build daily thumbnail cache key"
        id: thumb-cache-key
        shell: bash
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: "Restore YouTube thumbnails cache (daily)"
        id: thumb-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: public/images/thumb
          key: youtube-thumbs-${{ runner.os }}-${{ steps.thumb-cache-key.outputs.date }}

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: gd, iconv

      - name: "Download latest calendar"
        run: |
          curl -sSL "${{ env.LATEST_CALENDAR_URL }}" \
              --output "events/events_${YEAR}.json" \
              --max-time 15

      - name: "Cache athlete start-list photos"
        run: php bin/cache-athlete-photos

      - name: "Build structured data"
        run: php bin/build-structured-data --minify

      - name: "Build sitemap"
        run: php bin/build-sitemap

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Install frontend dependencies"
        run: npm install --no-package-lock

      - name: "Cache YouTube thumbnails"
        run: node bin/cache-youtube-thumbnails.mjs

      - name: "Minify non-min CSS files"
        run: |
          find public/css -maxdepth 1 -type f -name "*.css" ! -name "*min*.css" -print0 | while IFS= read -r -d '' css_file; do
            TMP_CSS="$(mktemp)"
            npx --yes clean-css-cli@5.6.3 -O2 -o "${TMP_CSS}" "${css_file}"
            mv "${TMP_CSS}" "${css_file}"
          done

      - name: "Set asset version from commit SHA"
        shell: bash
        run: |
          ASSET_VERSION="${GITHUB_SHA:0:8}"
          printf '{\n  "version": "%s"\n}\n' "${ASSET_VERSION}" > public/version.json

      - name: "Build JS bundle (minified)"
        run: npm run build:js:min

      - name: "Build Astro site"
        env:
          NODE_ENV: production
        run: npm run build:astro -- --mode production

      - name: "Save YouTube thumbnails cache (daily)"
        if: always() && steps.thumb-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: public/images/thumb
          key: youtube-thumbs-${{ runner.os }}-${{ steps.thumb-cache-key.outputs.date }}

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'dist/'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
